name: Build Linux Heimdall 7.0-rc5

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space (1/3) - Manual Purge
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Free disk space (2/3) - Tool Cache Cleanup
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Free disk space (3/3) - Slimhub
        uses: rokibhasansagar/slimhub_actions@main

      - name: Set swap to 8 GB
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 8

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc libudev-dev libpci-dev libiberty-dev autoconf
          
      - name: Clone linux-heimdall kernel source
        run: |
          git clone --depth 1 https://github.com/nc4tt/linux-heimdall.git kernel-source
          cd kernel-source

      - name: Configure and Build
        working-directory: kernel-source
        run: |
          make mrproper
          make defconfig
          # Using all available cores for speed
          make -j$(nproc)

      - name: Extract Artifacts and Clean Source
        run: |
          mkdir -p output
          cp kernel-source/arch/x86/boot/bzImage output/
          cp kernel-source/.config output/kernel.config
          
          find kernel-source -name "*.ko" -exec cp {} output/ \; || true
          
          rm -rf kernel-source
          echo "Cleanup complete. Source removed, artifacts preserved in ./output"

      - name: Upload Build Result
        uses: actions/upload-artifact@v4
        with:
          name: heimdall-kernel-7.0-rc5
          path: output/
          retention-days: 5
